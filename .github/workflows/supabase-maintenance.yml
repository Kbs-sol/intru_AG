name: Supabase Maintenance & Backup

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  keep_alive:
    name: Supabase Keep-Alive
    runs-on: ubuntu-latest
    steps:
      - name: Ping Production API
        run: |
          # Pinging the products API ensures Supabase is touched and kept active
          curl -s https://intru-genz.pages.dev/api/products > /dev/null
          echo "Keep-alive ping sent successfully."

  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    needs: keep_alive
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg curl
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17 zip

      - name: Check Database Connectivity
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
          PGPORT: 6543
          PGCONNECT_TIMEOUT: 5
        run: |
          # Try to ping the database using environment variables
          if psql -c "SELECT 1" > /dev/null; then
            echo "Database connection successful."
          else
            echo "::error::Database connection failed. Please ensure DB_HOST, DB_USER, and SUPABASE_DB_PASSWORD are correct (Port 6543)."
            exit 1
          fi

      - name: Export Database
        env:
          PGHOST: ${{ secrets.DB_HOST }}
          PGUSER: ${{ secrets.DB_USER }}
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGDATABASE: postgres
          PGPORT: 6543
        run: |
          # Use pg_dump with environment variables
          pg_dump --no-owner --no-privileges > full_backup.sql
          echo "Database export completed."

      - name: Encrypt Backup
        env:
          BACKUP_PASS: ${{ secrets.DB_BACKUP_PASSWORD }}
        run: |
          # Zip the SQL file with a password-protected encryption
          zip -P "$BACKUP_PASS" -r db_backup_latest.zip full_backup.sql
          echo "Backup encrypted successfully."

      - name: Prepare Upload Payload
        run: |
          # Isolate the backup file so we don't sync the whole repo to R2
          mkdir -p upload_payload
          mv db_backup_latest.zip upload_payload/
          echo "Payload prepared."

      - name: Upload to Cloudflare R2
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl private --follow-symlinks
        env:
          # R2 is S3-compatible, so we use the S3 action
          AWS_S3_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_REGION: 'auto'
          SOURCE_DIR: 'upload_payload'
          DEST_DIR: 'backups/'

      - name: Cleanup
        run: |
          rm -rf full_backup.sql upload_payload
          echo "Local temporary files cleaned up."
